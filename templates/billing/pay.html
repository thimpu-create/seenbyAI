{% extends "base.html" %}

{% block title %}Pay with Razorpay - {{ product_name }}{% endblock %}

{% block content %}
<section class="mx-auto mt-10 max-w-2xl rounded-xl border border-[#E4E0D4] bg-white p-10 text-center shadow-sm">
    <p class="mono text-xs font-semibold uppercase tracking-wider text-[#8B8578]">Secure checkout</p>
    <h1 class="display mt-3 text-4xl font-medium tracking-tight text-[#13192B]">Complete payment</h1>
    <p class="mx-auto mt-4 max-w-lg text-sm leading-6 text-[#454C5E]">Razorpay will open in a secure overlay for ₹{{ amount_rupees|floatformat:0 }}. Credits will be added to {{ purchase.email }}.</p>
    <button id="pay-button" class="mt-7 inline-flex h-11 items-center justify-center rounded-md bg-[#13192B] px-5 text-sm font-semibold text-[#FAFAF7] shadow-sm hover:bg-black">Open Razorpay</button>
    <p id="payment-status" class="mt-3 text-sm text-[#8B8578]"></p>
</section>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
const payButton = document.getElementById("pay-button");
const statusLine = document.getElementById("payment-status");

const options = {
    key: "{{ key_id }}",
    amount: "{{ purchase.amount_paise }}",
    currency: "{{ purchase.currency }}",
    name: "{{ product_name }}",
    description: "{{ credits }} scan credits",
    order_id: "{{ purchase.razorpay_order_id }}",
    prefill: {
        email: "{{ purchase.email }}"
    },
    theme: {
        color: "#13192B"
    },
    handler: async function (response) {
        statusLine.textContent = "Verifying payment...";
        const body = new URLSearchParams({
            purchase_id: "{{ purchase.id }}",
            razorpay_payment_id: response.razorpay_payment_id,
            razorpay_order_id: response.razorpay_order_id,
            razorpay_signature: response.razorpay_signature
        });
        const result = await fetch("{% url 'verify_payment' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body
        });
        const data = await result.json();
        if (data.ok) {
            window.location.href = data.redirect_url;
        } else {
            statusLine.textContent = data.error || "Payment verification failed.";
        }
    }
};

const checkout = new Razorpay(options);
payButton.addEventListener("click", function () {
    checkout.open();
});
window.setTimeout(() => checkout.open(), 500);
</script>
{% endblock %}
